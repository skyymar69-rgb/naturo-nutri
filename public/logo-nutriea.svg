<svg viewBox="0 0 240 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nutriéa logo">
  <defs>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a5c2a"/>
      <stop offset="100%" stop-color="#0f3718"/>
    </linearGradient>
    <linearGradient id="leaf1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5db868"/>
      <stop offset="50%" stop-color="#8fd4a0"/>
      <stop offset="100%" stop-color="#3a8a4a"/>
    </linearGradient>
    <linearGradient id="leaf2Grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d7a3a"/>
      <stop offset="100%" stop-color="#1a5c2a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#0f3718" flood-opacity="0.18"/>
    </filter>
    <filter id="leafShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0f3718" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Cross — horizontal bar -->
  <rect x="72" y="38" width="96" height="28" rx="7" fill="url(#crossGrad)" filter="url(#shadow)"/>
  <!-- Cross — vertical bar -->
  <rect x="106" y="8" width="28" height="88" rx="7" fill="url(#crossGrad)" filter="url(#shadow)"/>

  <!-- Large leaf (sage green, lighter) -->
  <path d="M 98,78 C 98,78 156,65 162,118 C 162,118 140,142 108,130 C 76,118 90,90 98,78 Z"
        fill="url(#leaf1Grad)" stroke="#1e6535" stroke-width="2.5" filter="url(#leafShadow)"/>
  <!-- Large leaf central vein -->
  <path d="M 100,82 C 118,95 142,112 160,118"
        stroke="#1a5c2a" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Large leaf secondary veins -->
  <path d="M 115,92 C 120,100 125,110 124,120" stroke="#1a5c2a" stroke-width="1" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M 130,88 C 138,97 142,108 140,120"  stroke="#1a5c2a" stroke-width="1" fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- Small leaf (darker green) -->
  <path d="M 112,104 C 112,104 152,95 154,132 C 154,132 132,148 114,136 C 96,124 106,112 112,104 Z"
        fill="url(#leaf2Grad)" stroke="#0f3718" stroke-width="2" filter="url(#leafShadow)"/>
  <!-- Small leaf vein -->
  <path d="M 113,108 C 127,118 143,128 153,132"
        stroke="#0a2414" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Text: Nutriéa -->
  <text
    x="120" y="196"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46"
    font-weight="400"
    fill="#0f3718"
    text-anchor="middle"
    letter-spacing="-0.5"
  >Nutri<tspan fill="#33a85f">é</tspan>a</text>

  <!-- Slogan — small -->
  <text
    x="120" y="222"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11.5"
    font-weight="400"
    fill="#3a8a4a"
    text-anchor="middle"
    letter-spacing="0.6"
    font-style="italic"
  >L'alliance de la nature et de la nutrition</text>
</svg>
